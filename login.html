<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso | Plus Laboratorio Clínico</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="assets/images/PLUS.png" type="image/png" />
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height:100vh">

<div class="card p-4 shadow text-center" style="width:360px">
  <h4 class="mb-4">🔬 Plus Laboratorio Clínico</h4>

  <!-- Mensaje -->
  <div id="mensaje" class="alert alert-danger d-none" role="alert">
    Acceso no autorizado
  </div>

  <!-- Botón -->
  <button class="btn btn-primary w-100" onclick="mostrarMensaje()">
    Intentar acceder
  </button>
</div>

<script>
function mostrarMensaje() {
  document.getElementById("mensaje").classList.remove("d-none");
}
</script>

</body>
</html>
